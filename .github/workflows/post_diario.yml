name: Post Diario LinkedIn

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Teste sem publicar (monta o post mas NÃO envia)'
        type: boolean
        default: false
  schedule:
    # Horários de pico de engajamento no LinkedIn (estudos 2026: Buffer 4,8M
    # posts, Sprout, Kanbox). Público brasileiro, então BRT = UTC-3.
    # O GitHub Actions roda em UTC. Minuto ':17' evita o ':00' (fila mais
    # concorrida, que costuma atrasar o agendamento em horas).
    #   ter/qua/qui às 09:17 BRT (manhã, janela de maior alcance)
    - cron: '17 12 * * 2,3,4'
    #   sexta às 15:17 BRT (segundo pico citado nos estudos)
    - cron: '17 18 * * 5'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Verificação de Segredos (Debug)
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then echo "❌ GEMINI_API_KEY vazio"; else echo "✅ GEMINI_API_KEY detectado"; fi
          if [ -z "${{ secrets.LINKEDIN_ACCESS_TOKEN }}" ]; then echo "❌ LINKEDIN_ACCESS_TOKEN vazio"; else echo "✅ LINKEDIN_ACCESS_TOKEN detectado"; fi

      - name: Rodar Script de Postagem
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          CONTENT_DIR: content
          DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
        run: python automacao_linkedin.py

      - name: Avisar se o token expirou (abre Issue)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f .token_expired ]; then
            existe=$(gh issue list --state open --search "Token do LinkedIn expirou in:title" --json number --jq 'length')
            if [ "$existe" = "0" ]; then
              gh issue create \
                --title "🔑 Token do LinkedIn expirou — renove o LINKEDIN_ACCESS_TOKEN" \
                --body "$(cat .token_expired)"
              echo "📨 Issue de lembrete criada."
            else
              echo "ℹ️ Já existe uma issue aberta de lembrete."
            fi
          else
            echo "ℹ️ Falha não relacionada ao token (sem flag .token_expired)."
          fi

      - name: Salvar progresso
        if: success()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          rm -f .token_expired post_image.png
          git add post_index.txt
          if git commit -m "Atualiza índice [skip ci]"; then
            git push || (git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push)
          else
            echo "Sem mudanças no índice."
          fi
